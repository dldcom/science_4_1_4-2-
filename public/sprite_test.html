<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>미생물 스프라이트 그리드 좌표 확인용</title>
  <style>
    body {
      background-color: #0d0e15;
      color: #e2e8f0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
    }
    h1 {
      color: #38bdf8;
      margin-bottom: 5px;
    }
    p {
      color: #94a3b8;
      margin-bottom: 30px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 150px);
      gap: 15px;
      justify-content: center;
      margin: 0 auto;
      max-width: 850px;
    }
    .cell {
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 15px;
      background-color: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
      transition: all 0.2s;
    }
    .cell:hover {
      border-color: #38bdf8;
      transform: translateY(-2px);
    }
    .sprite {
      width: 100px;
      height: 100px;
      background-image: url('/images/microbes_spritesheet.png');
      background-size: 500% 500%;
      image-rendering: pixelated;
      margin-bottom: 10px;
      filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.4));
    }
    .coord {
      font-size: 14px;
      font-weight: bold;
      color: #f1f5f9;
    }
    .hint {
      font-size: 11px;
      color: #64748b;
      margin-top: 3px;
    }
  </style>
</head>
<body>
  <h1>🧬 미생물 스프라이트 시트 격자 좌표 확인</h1>
  <p>각 셀의 이미지가 어떤 모양인지 확인하고 원하는 좌표(Row, Col)를 설정할 때 참고하세요.</p>
  
  <div class="grid" id="grid"></div>

  <script>
    const nameMap = {
      '0,0': '버섯',
      '0,1': '곰팡이',
      '0,2': '이스트',
      '0,3': '누룩곰팡이',
      '1,0': '짚신벌레',
      '1,1': '아메바',
      '1,2': '해캄',
      '2,0': '대장균',
      '2,1': '젖산균',
      '2,2': '고초균',
      '2,3': '아세트산균',
      '3,0': '화산 버섯',
      '3,1': '네온 곰팡이',
      '3,2': '포자버섯 젤리',
      '3,3': '제트 짚신벌레',
      '3,4': '블랙홀 아메바',
      '4,0': '우주 태양 아메바',
      '4,1': '메가 이스트'
    };

    const grid = document.getElementById('grid');
    for (let r = 0; r < 5; r++) {
      for (let c = 0; c < 5; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        
        const sprite = document.createElement('div');
        sprite.className = 'sprite';
        // 5 columns/rows means 0%, 25%, 50%, 75%, 100% position mapping
        sprite.style.backgroundPosition = `${c * 25}% ${r * 25}%`;
        
        const key = `${r},${c}`;
        const name = nameMap[key] || '미사용 / 빈 칸';
        
        const label = document.createElement('div');
        label.className = 'coord';
        label.innerText = name;
        
        cell.appendChild(sprite);
        cell.appendChild(label);
        grid.appendChild(cell);
      }
    }
  </script>
</body>
</html>
